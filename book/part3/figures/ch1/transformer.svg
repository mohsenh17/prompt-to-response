<svg viewBox="0 0 420 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#444"/>
    </marker>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>

    <style>
      .box { rx:10; ry:10; filter:url(#shadow); }
      .title { font: 600 14px Arial; fill:#222; }
      .text { font: 12px Arial; fill:#222; }
      .small { font: 11px Arial; fill:#555; }
      .dash { stroke:#999; stroke-dasharray:6 4; }
    </style>
  </defs>

  <!-- Input -->
  <text x="210" y="30" class="title" text-anchor="middle">
    Input: [the, cat, sat, on, the]
  </text>
  <line x1="210" y1="40" x2="210" y2="65" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Token Embeddings -->
  <rect x="110" y="70" width="200" height="42" fill="#e3f2fd" stroke="#1e88e5" class="box"/>
  <text x="210" y="96" class="text" text-anchor="middle">Token Embeddings</text>

  <line x1="210" y1="112" x2="210" y2="135" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Positional Encoding -->
  <rect x="110" y="140" width="200" height="42" fill="#fff8e1" stroke="#f9a825" class="box"/>
  <text x="210" y="166" class="text" text-anchor="middle">Positional Encoding</text>

  <line x1="210" y1="182" x2="210" y2="210" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Transformer Block -->
  <rect x="60" y="210" width="300" height="340" fill="none" stroke="#666" class="dash"/>
  <text x="70" y="232" class="small" font-weight="bold">Transformer Block × N</text>

  <!-- Self Attention -->
  <rect x="110" y="245" width="200" height="42" fill="#fce4ec" stroke="#d81b60" class="box"/>
  <text x="210" y="271" class="text" text-anchor="middle">Multi-Head Self-Attention</text>

  <line x1="210" y1="287" x2="210" y2="310" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Add & Norm -->
  <rect x="110" y="315" width="200" height="42" fill="#e8f5e9" stroke="#43a047" class="box"/>
  <text x="210" y="341" class="text" text-anchor="middle">Add &amp; Layer Norm</text>

  <line x1="210" y1="357" x2="210" y2="380" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FFN -->
  <rect x="110" y="385" width="200" height="42" fill="#ede7f6" stroke="#5e35b1" class="box"/>
  <text x="210" y="411" class="text" text-anchor="middle">Feed-Forward Network</text>

  <line x1="210" y1="427" x2="210" y2="450" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Add & Norm -->
  <rect x="110" y="455" width="200" height="42" fill="#e8f5e9" stroke="#43a047" class="box"/>
  <text x="210" y="481" class="text" text-anchor="middle">Add &amp; Layer Norm</text>

  <!-- Residual (cleaner) -->
  <path d="M 320 265 C 360 265, 360 480, 320 480"
        fill="none" stroke="#1e88e5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="365" y="380" class="small" fill="#1e88e5" transform="rotate(-90 365,380)">
    Residual
  </text>

  <!-- Output head -->
  <line x1="210" y1="497" x2="210" y2="545" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="90" y="545" width="240" height="42" fill="#eeeeee" stroke="#424242" class="box"/>
  <text x="210" y="571" class="text" text-anchor="middle">
    Linear Projection to Vocabulary
  </text>

  <line x1="210" y1="587" x2="210" y2="615" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="110" y="620" width="200" height="42" fill="#fff3e0" stroke="#ef6c00" rx="20" ry="20" class="box"/>
  <text x="210" y="646" class="text" text-anchor="middle" font-weight="bold">
    Softmax Probabilities
  </text>

</svg>