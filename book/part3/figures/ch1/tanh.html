<style>
/* FORCE PRINT COLORS TO MATCH SCREEN */
* {
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
}

@media print {
  html, body {
    background: #ffffff !important;
  }

  /* ensure containers keep background colors */
  div {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  canvas {
    /* ensures canvas is not flattened/altered */
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
}
</style>

<div style="background:#ffffff;padding:20px 14px 24px;font-family:var(--font-sans)">

  

  <!-- Main 4-column grid -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:start">

    <!-- ── Col 1: tanh(x) ── -->
    <div style="display:flex;flex-direction:column">
      <div style="background:#EEEDFE;border:1px solid #7F77DD;border-radius:8px;padding:11px 8px 10px;min-height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
        <div style="background:#534AB7;color:#fff;width:21px;height:21px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-bottom:2px;flex-shrink:0">1</div>
        <div style="font-size:12px;font-weight:600;color:#26215C;font-family:var(--font-mono);letter-spacing:0.01em">\( \tanh(x) \)</div>
        <div style="font-size:9px;color:#534AB7;font-family:var(--font-mono);line-height:1.3;text-align:center">\( f_1(x) = \tanh(x) \)</div>
      </div>
      <div style="width:1px;height:14px;background:#d0cecc;margin:0 auto;position:relative">
        <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid #d0cecc"></div>
      </div>
      <div style="background:#F3F2FD;border:0.5px solid #AFA9EC;border-radius:6px;padding:5px 4px 3px;overflow:hidden">
        <canvas id="c1" style="display:block;width:100%;height:90px"></canvas>
      </div>
    </div>

    <!-- ── Col 2: x·tanh(x) ── -->
    <div style="display:flex;flex-direction:column">
      <div style="background:#E1F5EE;border:1px solid #5DCAA5;border-radius:8px;padding:11px 8px 10px;min-height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
        <div style="background:#0F6E56;color:#fff;width:21px;height:21px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-bottom:2px;flex-shrink:0">2</div>
        <div style="font-size:12px;font-weight:600;color:#04342C;font-family:var(--font-mono);letter-spacing:0.01em">\( x \cdot \tanh(x) \)</div>
        <div style="font-size:9px;color:#0F6E56;font-family:var(--font-mono);line-height:1.3;text-align:center">\( f_2(x) = x \tanh(x) \)</div>
      </div>
      <div style="width:1px;height:14px;background:#d0cecc;margin:0 auto;position:relative">
        <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid #d0cecc"></div>
      </div>
      <div style="background:#EAF9F3;border:0.5px solid #9FE1CB;border-radius:6px;padding:5px 4px 3px;overflow:hidden">
        <canvas id="c2" style="display:block;width:100%;height:90px"></canvas>
      </div>
    </div>

    <!-- ── Col 3: x + x·tanh(x) ── -->
    <div style="display:flex;flex-direction:column">
      <div style="background:#FAECE7;border:1px solid #D85A30;border-radius:8px;padding:11px 8px 10px;min-height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
        <div style="background:#993C1D;color:#fff;width:21px;height:21px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-bottom:2px;flex-shrink:0">3</div>
        <div style="font-size:11px;font-weight:600;color:#4A1B0C;font-family:var(--font-mono);letter-spacing:0.01em">\( x + x \cdot \tanh(x) \)</div>
        <div style="font-size:8.5px;color:#993C1D;font-family:var(--font-mono);line-height:1.35;text-align:center">\( f_3(x) = x(1 + \tanh(x)) \)</div>
      </div>
      <div style="width:1px;height:14px;background:#d0cecc;margin:0 auto;position:relative">
        <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid #d0cecc"></div>
      </div>
      <div style="background:#FEF2EE;border:0.5px solid #F0997B;border-radius:6px;padding:5px 4px 3px;overflow:hidden">
        <canvas id="c3" style="display:block;width:100%;height:90px"></canvas>
      </div>
    </div>

    <!-- ── Col 4: GELU (approx.) ── -->
    <div style="display:flex;flex-direction:column">
      <div style="background:#FAEEDA;border:1px solid #EF9F27;border-radius:8px;padding:11px 8px 10px;min-height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
        <div style="background:#854F0B;color:#fff;width:21px;height:21px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-bottom:2px;flex-shrink:0">4</div>
        <div style="font-size:11px;font-weight:600;color:#412402;font-family:var(--font-sans);letter-spacing:0.01em">GELU (approx.)</div>
        <div style="font-size:7.8px;color:#854F0B;font-family:var(--font-mono);line-height:1.4;text-align:center">\(
f_4 = 0.5x \left(1 + \tanh\left(\sqrt{\frac{2}{\pi}} \left(x + 0.044715x^3 \right)\right)\right)
\)</div>
      </div>
      <div style="width:1px;height:14px;background:#d0cecc;margin:0 auto;position:relative">
        <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid #d0cecc"></div>
      </div>
      <div style="background:#FDF8EE;border:0.5px solid #FAC775;border-radius:6px;padding:5px 4px 3px;overflow:hidden">
        <canvas id="c4" style="display:block;width:100%;height:90px"></canvas>
      </div>
    </div>

  </div>
</div>

<script>
function draw(id, fn, opts) {
  const cv = document.getElementById(id);
  if (!cv) return;
  const dpr = window.devicePixelRatio || 2;
  const rect = cv.getBoundingClientRect();
  const w = rect.width || 140, h = rect.height || 90;
  cv.width = Math.round(w * dpr);
  cv.height = Math.round(h * dpr);
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = {l:27, r:6, t:7, b:17};
  const pw = w - pad.l - pad.r;
  const ph = h - pad.t - pad.b;
  const {xmin=-4, xmax=4, ymin, ymax, color, refs=[], yticks=[], dashedLine} = opts;

  const tx = x => pad.l + (x - xmin) / (xmax - xmin) * pw;
  const ty = y => pad.t + ph - (y - ymin) / (ymax - ymin) * ph;

  // Background: pure white for print
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);

  // Subtle vertical grid
  ctx.strokeStyle = 'rgba(0,0,0,0.055)';
  ctx.lineWidth = 0.5;
  [-3, 0, 3].forEach(x => {
    ctx.beginPath();
    ctx.moveTo(tx(x), pad.t);
    ctx.lineTo(tx(x), pad.t + ph);
    ctx.stroke();
  });

  // Reference dashed lines
  refs.forEach(ry => {
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.13)';
    ctx.lineWidth = 0.6;
    ctx.setLineDash([2, 3]);
    ctx.beginPath();
    ctx.moveTo(pad.l, ty(ry));
    ctx.lineTo(pad.l + pw, ty(ry));
    ctx.stroke();
    ctx.restore();
  });

  // Axes
  ctx.strokeStyle = 'rgba(0,0,0,0.22)';
  ctx.lineWidth = 0.75;
  ctx.beginPath(); ctx.moveTo(pad.l, ty(0)); ctx.lineTo(pad.l + pw, ty(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx(0), pad.t); ctx.lineTo(tx(0), pad.t + ph); ctx.stroke();

  // Axis tick labels
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.font = '7.5px var(--font-sans)';
  ctx.textAlign = 'center';
  [-3, 3].forEach(v => ctx.fillText(v, tx(v), pad.t + ph + 12));
  ctx.textAlign = 'right';
  ctx.font = '7px var(--font-sans)';
  yticks.forEach(v => ctx.fillText(v, pad.l - 3, ty(v) + 2.5));

  // Optional asymptote / reference line (dashed, faint)
  if (dashedLine) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 0.75;
    ctx.setLineDash([3, 4]);
    ctx.globalAlpha = 0.22;
    ctx.beginPath();
    dashedLine.forEach(([x, y], i) => i === 0 ? ctx.moveTo(tx(x), ty(y)) : ctx.lineTo(tx(x), ty(y)));
    ctx.stroke();
    ctx.restore();
  }

  // Main function curve
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.75;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.beginPath();
  let started = false;
  for (let i = 0; i <= 500; i++) {
    const x = xmin + (xmax - xmin) * i / 500;
    const y = fn(x);
    if (y < ymin - 0.5 || y > ymax + 0.5) {
      if (started) { ctx.stroke(); ctx.beginPath(); started = false; }
      continue;
    }
    if (!started) { ctx.moveTo(tx(x), ty(y)); started = true; }
    else ctx.lineTo(tx(x), ty(y));
  }
  ctx.stroke();
}

setTimeout(() => {
  draw('c1', x => Math.tanh(x),
    {ymin:-1.5, ymax:1.5, color:'#534AB7', refs:[1,-1], yticks:[-1,1]});
  draw('c2', x => x * Math.tanh(x),
    {ymin:-0.4, ymax:4, color:'#0F6E56', refs:[0], yticks:[0,2,4]});
  draw('c3', x => x + x * Math.tanh(x),
    {ymin:-0.5, ymax:8, color:'#993C1D', refs:[0], yticks:[0,4,8], dashedLine:[[-4,-8],[4,8]]});
  draw('c4', x => 0.5*x*(1+Math.tanh(Math.sqrt(2/Math.PI)*(x+0.044715*x*x*x))),
    {ymin:-0.5, ymax:8, color:'#854F0B', refs:[0], yticks:[0,4,8]});
}, 200);
</script>
