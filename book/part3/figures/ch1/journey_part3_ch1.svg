<svg viewBox="0 0 1000 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Professional Sans-Serif Stack */
      .part-tag { 
        font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        font-size: 9px; 
        font-weight: 800; 
        fill: #94A3B8; 
        text-anchor: middle; 
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .part-title { 
        font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        font-size: 11px; 
        font-weight: 500; 
        fill: #475569; 
        text-anchor: middle; 
      }
      .current-chapter { 
        font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        font-size: 11px; 
        font-weight: 700; 
        fill: #2563EB; 
        text-anchor: middle;
      }
      .completed { fill: #3B82F6; }
      .active { fill: #0F172A; }
      .future { fill: #CBD5E1; }
    </style>
  </defs>

  <rect x="50" y="60" width="900" height="2" rx="1" fill="#F1F5F9" />
  <rect x="50" y="60" width="295" height="2" rx="1" fill="#3B82F6" />

  <g transform="translate(50, 60)">
    <circle r="5" fill="#3B82F6" />
    <text y="-35" class="part-tag completed">PART I</text>
    <!-- <text y="-20" class="part-title">When the Word is Spoken Into the Void</text> -->
  </g>

  <g transform="translate(200, 60)">
    <circle r="4" fill="#3B82F6" />
    <text y="-35" class="part-tag completed">PART II</text>
  </g>

  <g transform="translate(350, 60)">
  <circle r="8" fill="#fff" stroke="#3B82F6" stroke-width="2.5" />
    <circle r="3" fill="#3B82F6" />
    <text y="-35" class="part-tag active">PART III</text>
    <text y="-20" class="part-title active">Beyond the Gate of Words</text>
    <g transform="translate(0, 30)">
      <rect x="-85" y="0" width="170" height="34" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
      <text x="0" y="21" class="current-chapter">Transformer Architecture</text>
      <path d="M -6 0 L 0 -8 L 6 0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
      <rect x="-7" y="0" width="14" height="2" fill="#F8FAFC" />
    </g>
  </g>
  <g transform="translate(500, 60)"><circle r="4" fill="#F1F5F9" /><text y="-35" class="part-tag">IV</text></g>
  <g transform="translate(650, 60)"><circle r="4" fill="#F1F5F9" /><text y="-35" class="part-tag">V</text></g>
  <g transform="translate(800, 60)"><circle r="4" fill="#F1F5F9" /><text y="-35" class="part-tag">VI</text></g>
  <g transform="translate(950, 60)"><circle r="4" fill="#F1F5F9" /><text y="-35" class="part-tag">VII</text></g>
</svg>
