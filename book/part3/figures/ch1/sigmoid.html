
<style>

<div style="background:#ffffff;padding:20px 14px 24px;font-family:var(--font-sans)">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:start">

    <!-- Col 1: σ(x) -->
    <div style="display:flex;flex-direction:column">
      <div style="background:#E6F1FB;border:1px solid #378ADD;border-radius:8px;padding:11px 8px 10px;min-height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
        <div style="background:#185FA5;color:#fff;width:21px;height:21px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-bottom:2px;flex-shrink:0">1</div>
        <div style="font-size:13px;font-weight:600;color:#042C53;font-family:var(--font-mono);letter-spacing:0.01em">\( \sigma(x) \)</div>
        <div style="font-size:9px;color:#185FA5;font-family:var(--font-mono);line-height:1.3;text-align:center">\( 1 / (1 + e^{-x}) \)</div>
      </div>
      <div style="width:1px;height:14px;background:#d0cecc;margin:0 auto;position:relative">
        <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid #d0cecc"></div>
      </div>
      <div style="background:#EAF2FC;border:0.5px solid #85B7EB;border-radius:6px;padding:5px 4px 3px;overflow:hidden">
        <canvas id="c1" style="display:block;width:100%;height:90px"></canvas>
      </div>
    </div>

    <!-- Col 2: x·σ(x) -->
    <div style="display:flex;flex-direction:column">
      <div style="background:#EEEDFE;border:1px solid #7F77DD;border-radius:8px;padding:11px 8px 10px;min-height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
        <div style="background:#534AB7;color:#fff;width:21px;height:21px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-bottom:2px;flex-shrink:0">2</div>
        <div style="font-size:13px;font-weight:600;color:#26215C;font-family:var(--font-mono);letter-spacing:0.01em">\( x \cdot \sigma(x) \)</div>
        <div style="font-size:9px;color:#534AB7;font-family:var(--font-mono);line-height:1.3;text-align:center">\( \text{Swish}(\beta = 1) \)</div>
      </div>
      <div style="width:1px;height:14px;background:#d0cecc;margin:0 auto;position:relative">
        <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid #d0cecc"></div>
      </div>
      <div style="background:#F3F2FD;border:0.5px solid #AFA9EC;border-radius:6px;padding:5px 4px 3px;overflow:hidden">
        <canvas id="c2" style="display:block;width:100%;height:90px"></canvas>
      </div>
    </div>

    <!-- Col 3: x·σ(βx) -->
    <div style="display:flex;flex-direction:column">
      <div style="background:#E1F5EE;border:1px solid #5DCAA5;border-radius:8px;padding:11px 8px 10px;min-height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
        <div style="background:#0F6E56;color:#fff;width:21px;height:21px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-bottom:2px;flex-shrink:0">3</div>
        <div style="font-size:12px;font-weight:600;color:#04342C;font-family:var(--font-mono);letter-spacing:0.01em">\( x \cdot \sigma(\beta x) \)</div>
        <div style="font-size:9px;color:#0F6E56;font-family:var(--font-mono);line-height:1.3;text-align:center">\( \text{Swish}(\beta) \) (β=5)</div>
      </div>
      <div style="width:1px;height:14px;background:#d0cecc;margin:0 auto;position:relative">
        <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid #d0cecc"></div>
      </div>
      <div style="background:#EAF9F3;border:0.5px solid #9FE1CB;border-radius:6px;padding:5px 4px 3px;overflow:hidden">
        <canvas id="c3" style="display:block;width:100%;height:90px"></canvas>
      </div>
    </div>

    

  </div>

  
</div>

<script>
const sig = x => 1 / (1 + Math.exp(-x));

function draw(id, fns, opts) {
  const cv = document.getElementById(id);
  if (!cv) return;
  const dpr = window.devicePixelRatio || 2;
  const rect = cv.getBoundingClientRect();
  const w = rect.width || 140, h = rect.height || 90;
  cv.width = Math.round(w * dpr);
  cv.height = Math.round(h * dpr);
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = {l:27, r:6, t:7, b:17};
  const pw = w - pad.l - pad.r;
  const ph = h - pad.t - pad.b;
  const {xmin=-4, xmax=4, ymin, ymax, yticks=[], refs=[]} = opts;

  const tx = x => pad.l + (x - xmin) / (xmax - xmin) * pw;
  const ty = y => pad.t + ph - (y - ymin) / (ymax - ymin) * ph;

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);

  ctx.strokeStyle = 'rgba(0,0,0,0.055)';
  ctx.lineWidth = 0.5;
  [-3, 0, 3].forEach(x => {
    ctx.beginPath(); ctx.moveTo(tx(x), pad.t); ctx.lineTo(tx(x), pad.t + ph); ctx.stroke();
  });

  refs.forEach(ry => {
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.13)';
    ctx.lineWidth = 0.6;
    ctx.setLineDash([2, 3]);
    ctx.beginPath(); ctx.moveTo(pad.l, ty(ry)); ctx.lineTo(pad.l + pw, ty(ry)); ctx.stroke();
    ctx.restore();
  });

  ctx.strokeStyle = 'rgba(0,0,0,0.22)';
  ctx.lineWidth = 0.75;
  ctx.beginPath(); ctx.moveTo(pad.l, ty(0)); ctx.lineTo(pad.l + pw, ty(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx(0), pad.t); ctx.lineTo(tx(0), pad.t + ph); ctx.stroke();

  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.font = '7.5px sans-serif';
  ctx.textAlign = 'center';
  [-3, 3].forEach(v => ctx.fillText(v, tx(v), pad.t + ph + 12));
  ctx.textAlign = 'right';
  ctx.font = '7px sans-serif';
  yticks.forEach(v => ctx.fillText(v, pad.l - 3, ty(v) + 2.5));

  fns.forEach(({fn, color, dashed}) => {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = dashed ? 1.2 : 1.75;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    if (dashed) ctx.setLineDash([4, 3]);
    ctx.beginPath();
    let started = false;
    for (let i = 0; i <= 500; i++) {
      const x = xmin + (xmax - xmin) * i / 500;
      const y = fn(x);
      if (y < ymin - 0.5 || y > ymax + 0.5) { if (started) { ctx.stroke(); ctx.beginPath(); started = false; } continue; }
      if (!started) { ctx.moveTo(tx(x), ty(y)); started = true; }
      else ctx.lineTo(tx(x), ty(y));
    }
    ctx.stroke();
    ctx.restore();
  });
}

setTimeout(() => {
  draw('c1', [{fn: x => sig(x), color: '#185FA5'}],
    {ymin: -0.2, ymax: 1.2, refs: [0, 1], yticks: [0, 1]});

  draw('c2', [{fn: x => x * sig(x), color: '#534AB7'}],
    {ymin: -0.5, ymax: 4, refs: [0], yticks: [0, 2, 4]});

  draw('c3',
    [{fn: x => x * sig(5 * x), color: '#0F6E56'},
     {fn: x => x * sig(x), color: '#AFA9EC', dashed: true}],
    {ymin: -0.5, ymax: 4, refs: [0], yticks: [0, 2, 4]});

  draw('c4',
    [{fn: x => x * sig(x), color: '#854F0B'},
     {fn: x => Math.max(0, x), color: '#aaa', dashed: true}],
    {ymin: -0.5, ymax: 4, refs: [0], yticks: [0, 2, 4]});
}, 200);
</script>
